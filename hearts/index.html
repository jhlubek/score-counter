<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hearts - Counter</title>
    <link rel="stylesheet" href="../shared/output.css">
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen text-gray-800 dark:text-gray-200 transition-colors">

<div class="max-w-md mx-auto">

<!-- Home Screen -->
<div id="screen-home" class="screen p-4 pb-16">
    <div class="flex justify-between items-center mb-2">
        <a href="../" class="text-gray-500 dark:text-gray-400 text-sm py-1">&larr; <span data-i18n="allGames">All Games</span></a>
        <button id="theme-toggle" onclick="app.cycleTheme()" class="text-xl px-2 py-1"></button>
    </div>
    <h1 class="text-2xl font-bold text-center mb-6">&#9829; <span data-i18n="title">Hearts - Counter</span></h1>
    <button onclick="app.newGame()" class="w-full bg-red-600 dark:bg-red-700 text-white text-lg font-semibold py-4 rounded-xl active:bg-red-700 dark:active:bg-red-800 mb-6" data-i18n="newGame">
        New Game
    </button>
    <div id="game-history" class="space-y-3">
        <!-- filled by JS -->
    </div>
    <div class="fixed bottom-4 left-4 z-40">
        <div id="lang-selector" class="flex gap-1 text-xl">
            <!-- filled by JS -->
        </div>
    </div>
</div>

<!-- Player Setup Screen -->
<div id="screen-setup" class="screen p-4 hidden">
    <div class="flex justify-end mb-2">
        <button id="theme-toggle-setup" onclick="app.cycleTheme()" class="text-xl px-2 py-1"></button>
    </div>
    <h2 class="text-xl font-bold text-center mb-4" data-i18n="playerSetup">Player Setup</h2>
    <div id="player-list" class="space-y-3 mb-6">
        <!-- 4 player inputs, filled by JS -->
    </div>
    <button onclick="app.startGame()" class="w-full bg-green-600 dark:bg-green-700 text-white text-lg font-semibold py-4 rounded-xl active:bg-green-700 dark:active:bg-green-800" data-i18n="startGame">
        Start Game
    </button>
    <button onclick="app.showScreen('home')" class="w-full text-gray-500 dark:text-gray-400 text-sm py-3 mt-2" data-i18n="cancel">
        Cancel
    </button>
</div>

<!-- Game Board Screen -->
<div id="screen-game" class="screen p-2 pb-24 hidden">
    <div class="flex items-center justify-between mb-3 px-2">
        <button onclick="app.quitGame()" class="text-gray-500 dark:text-gray-400 text-sm py-1">&larr; <span data-i18n="back">Back</span></button>
        <h2 class="text-lg font-bold" data-i18n="game">Game</h2>
        <div class="w-16"></div>
    </div>

    <!-- Score Table -->
    <div class="overflow-x-auto">
        <table class="w-full text-center text-sm">
            <thead>
                <tr id="player-header" class="border-b-2 border-gray-300 dark:border-gray-600">
                    <th class="py-2 px-1 text-xs text-gray-500">#</th>
                    <!-- player name columns filled by JS -->
                </tr>
            </thead>
            <tbody id="rounds-body">
                <!-- round rows filled by JS -->
            </tbody>
            <tfoot>
                <tr id="totals-row" class="border-t-2 border-gray-300 dark:border-gray-600 font-bold text-base">
                    <td class="py-2">&Sigma;</td>
                    <!-- totals filled by JS -->
                </tr>
            </tfoot>
        </table>
    </div>

    <div id="game-over-banner" class="hidden mt-4 p-4 bg-red-100 dark:bg-red-900/40 border border-red-300 dark:border-red-700 rounded-xl text-center">
        <p class="text-red-700 font-bold text-lg" data-i18n="gameOver">Game Over!</p>
        <p id="game-over-text" class="text-red-600 text-sm mt-1"></p>
        <button onclick="app.finishGame()" class="mt-3 bg-red-600 text-white font-semibold px-6 py-2 rounded-lg active:bg-red-700" data-i18n="nextGame">
            Next Game
        </button>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 p-4 z-40">
        <button onclick="app.newRound()" id="btn-new-round" class="w-full max-w-md mx-auto block bg-blue-600 dark:bg-blue-700 text-white text-lg font-semibold py-4 rounded-xl active:bg-blue-700 dark:active:bg-blue-800" data-i18n="addRound">
            + Round
        </button>
    </div>
</div>

<!-- History Detail Screen -->
<div id="screen-history" class="screen p-4 hidden">
    <div class="flex justify-between items-center mb-4">
        <button onclick="app.showScreen('home')" class="text-gray-500 text-sm py-1">&larr; <span data-i18n="back">Back</span></button>
        <h2 class="text-lg font-bold" id="history-date"></h2>
        <div class="w-16"></div>
    </div>
    <div id="history-detail">
        <!-- filled by viewHistory -->
    </div>
</div>

<!-- Round Entry Screen -->
<div id="screen-round" class="screen p-4 pb-40 hidden">
    <div class="flex items-center justify-between mb-4">
        <button onclick="app.cancelRound()" class="text-gray-500 text-sm py-1">&larr; <span data-i18n="cancel">Cancel</span></button>
        <h2 class="text-lg font-bold" id="round-title">Round</h2>
        <button id="btn-manual-mode" onclick="app.toggleManualMode()" class="text-gray-500 text-sm py-1" data-i18n="manualMode">Manual</button>
    </div>

    <div id="round-players" class="space-y-4">
        <!-- per-player round entry, filled by JS -->
    </div>

    <!-- Sticky bottom: remaining cards + confirm -->
    <div class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 p-4 z-40">
        <div id="round-remaining" class="text-center text-xs text-gray-500 dark:text-gray-400 mb-2">
            <!-- filled by JS -->
        </div>
        <button onclick="app.confirmRound()" id="btn-confirm-round" class="w-full max-w-md mx-auto block bg-green-600 dark:bg-green-700 text-white text-lg font-semibold py-4 rounded-xl active:bg-green-700 dark:active:bg-green-800 disabled:bg-gray-300 dark:disabled:bg-gray-600 disabled:text-gray-500 dark:disabled:text-gray-400" disabled data-i18n="confirmRound">
            Confirm Round
        </button>
    </div>
</div>

</div><!-- /max-w-md -->

<!-- Cancel Round Confirmation Modal -->
<div id="modal-cancel" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50" onclick="app.closeCancelModal()">
    <div class="bg-white dark:bg-gray-800 rounded-2xl w-72 p-5 text-center" onclick="event.stopPropagation()">
        <p class="font-bold mb-1" data-i18n="cancelRound">Cancel round?</p>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-4" data-i18n="cancelRoundMsg">All entered points will be lost.</p>
        <div class="flex gap-3">
            <button onclick="app.closeCancelModal()" class="flex-1 py-3 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 font-semibold active:bg-gray-200 dark:active:bg-gray-600" data-i18n="keepEditing">
                Keep editing
            </button>
            <button onclick="app.confirmCancel()" class="flex-1 py-3 rounded-lg bg-red-600 text-white font-semibold active:bg-red-700" data-i18n="discard">
                Discard
            </button>
        </div>
    </div>
</div>

<!-- Quit Game Confirmation Modal -->
<div id="modal-quit" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50" onclick="app.closeQuitModal()">
    <div class="bg-white dark:bg-gray-800 rounded-2xl w-72 p-5 text-center" onclick="event.stopPropagation()">
        <p class="font-bold mb-1" data-i18n="quitGame">Quit game?</p>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-4" data-i18n="quitGameMsg">All game progress will be lost.</p>
        <div class="flex gap-3">
            <button onclick="app.closeQuitModal()" class="flex-1 py-3 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 font-semibold active:bg-gray-200 dark:active:bg-gray-600" data-i18n="continueGame">
                Continue
            </button>
            <button onclick="app.confirmQuit()" class="flex-1 py-3 rounded-lg bg-red-600 text-white font-semibold active:bg-red-700" data-i18n="quitConfirm">
                Quit
            </button>
        </div>
    </div>
</div>

<!-- Heart Picker Modal -->
<div id="modal-hearts" class="fixed inset-0 bg-black/50 flex items-end justify-center hidden z-50" onclick="app.closeModal(event)">
    <div class="bg-white dark:bg-gray-800 rounded-t-2xl w-full max-w-md p-4 pb-8" onclick="event.stopPropagation()">
        <p class="text-center font-bold mb-3" data-i18n="heartsCount">Hearts count</p>
        <div class="grid grid-cols-5 gap-2" id="hearts-picker-grid">
            <!-- 1-13 buttons filled by JS -->
        </div>
        <button onclick="app.clearHearts()" class="w-full mt-3 text-red-500 text-sm py-2" data-i18n="clear">Clear</button>
    </div>
</div>

<!-- Queen Picker Modal -->
<div id="modal-queen" class="fixed inset-0 bg-black/50 flex items-end justify-center hidden z-50" onclick="app.closeModal(event)">
    <div class="bg-white dark:bg-gray-800 rounded-t-2xl w-full max-w-md p-4 pb-8" onclick="event.stopPropagation()">
        <p class="text-center font-bold mb-3" data-i18n="queenOfSpades">Queen of Spades</p>
        <div class="grid grid-cols-3 gap-3" id="queen-picker-grid">
            <button onclick="app.pickQueen(13)" class="py-4 text-lg font-bold bg-purple-100 dark:bg-purple-900 dark:text-purple-200 rounded-xl active:bg-purple-200 dark:active:bg-purple-800">+13</button>
            <button onclick="app.pickQueen(26)" class="py-4 text-lg font-bold bg-purple-200 dark:bg-purple-800 dark:text-purple-100 rounded-xl active:bg-purple-300 dark:active:bg-purple-700">+26</button>
            <button onclick="app.pickQueen(39)" class="py-4 text-lg font-bold bg-purple-300 dark:bg-purple-700 dark:text-purple-100 rounded-xl active:bg-purple-400 dark:active:bg-purple-600">+39</button>
        </div>
        <button onclick="app.clearQueen()" class="w-full mt-3 text-red-500 text-sm py-2" data-i18n="clear">Clear</button>
    </div>
</div>

<script src="./app.js"></script>
</body>
</html>
